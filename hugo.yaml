# Hugo configuration file
title: SD Term 1

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Notes
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2

    - name: FAQs
      pageRef: /docs/faq
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/Keyin-SD-Faculty/SDNotesTerm1.git"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true


